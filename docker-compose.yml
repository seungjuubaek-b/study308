version: '3.8'

services:
  # 1. 회원님이 작성하신 완벽한 DB 설정! (데이터 영구 저장 포함)
  db:
    image: mysql:8.0
    container_name: mysql_jwbook
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '1111'
      MYSQL_DATABASE: 'jwbook'
    ports:
      - "3309:3306" # 외부(DBeaver 등)에서는 3309 포트로 접속합니다.
    volumes:
      - mysql_data:/var/lib/mysql
    # 🚀 한글 깨짐 방지를 위해 이 두 줄만 살짝 추가했습니다!
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # 2. 스프링 부트 앱 설정 (이 부분이 꼭 같이 있어야 배포가 됩니다!)
  app:
    build: .
    container_name: study308-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # 🚀 도커 내부에서끼리 통신할 때는 이름(db)과 내부 포트(3306)를 그대로 사용합니다.
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/jwbook?serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1111
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

# 회원님이 설정하신 DB 데이터 저장소 공간
volumes:
  mysql_data: