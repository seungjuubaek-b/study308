<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>board</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px 20px; color: #333; }
        .board-container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #222; font-size: 28px; margin-bottom: 30px; font-weight: bold; }

        .search-area { background-color: #f4f6f8; padding: 20px; border-radius: 8px; display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 14px; }
        input { width: 300px; }
        .btn-search { padding: 10px 25px; background-color: #3b3bf9; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-search:hover { background-color: #2b2bd8; }

        table { width: 100%; border-collapse: collapse; border-top: 2px solid #333; }
        th, td { padding: 15px 10px; text-align: center; border-bottom: 1px solid #eaeaea; font-size: 14px; }
        th { font-weight: 600; color: #555; }
        td.title-cell { text-align: left; padding-left: 20px; }
        td a { text-decoration: none; color: #222; }
        td a:hover { text-decoration: underline; color: #3b3bf9; }
        tbody tr:hover { background-color: #fcfcfc; }

        .btn-write-container { text-align: right; margin-top: 20px; }
        .btn-write { padding: 10px 20px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; display: inline-block;}
        .btn-write:hover { background-color: #555; }
    </style>
</head>
<body>

<div class="board-container">
    <h2>자유게시판</h2>

    <div class="search-area">
        <select id="searchType">
            <option value="all">전체</option>
            <option value="title">제목</option>
            <option value="content">내용</option>
            <option value="title_content">제목+내용</option>
            <option value="writer">작성자</option>
            <option value="comment">댓글내용</option>
            <option value="title_comment">제목+댓글내용</option>
        </select>
        <input type="text" id="searchKeyword" placeholder="검색어를 입력해주세요." onkeypress="if(event.keyCode==13) executeSearch();">
        <button class="btn-search" onclick="executeSearch()">검색</button>
    </div>

    <table>
        <thead>
        <tr>
            <th style="width: 80px;">번호</th>
            <th>제목</th>
            <th style="width: 120px;">작성자</th>
            <th style="width: 150px;">등록일</th>
        </tr>
        </thead>
        <tbody id="articleList">
        <tr><td colspan="4" style="padding: 30px; color: #777;">데이터를 불러오는 중이거나 검색 결과가 없습니다.</td></tr>
        </tbody>
    </table>

    <div class="btn-write-container">
        <a href="write.html" class="btn-write">✍ 글쓰기</a>
    </div>
</div>

<script>
    window.onload = function() {
        fetch('/api/articles')
            .then(response => response.json())
            .then(data => renderTable(data))
            .catch(error => console.error("불러오기 실패:", error));
    };

    function executeSearch() {
        const type = document.getElementById("searchType").value;
        const keyword = document.getElementById("searchKeyword").value;

        if(!keyword.trim()) {
            window.onload();
            return;
        }

        const url = `/api/articles/search?type=${type}&keyword=${encodeURIComponent(keyword)}`;

        fetch(url)
            .then(response => response.json())
            .then(data => renderTable(data))
            .catch(error => alert("검색 중 문제가 발생했습니다."));
    }

    function renderTable(data) {
        const tbody = document.getElementById("articleList");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='padding: 30px; color: #777;'>검색 결과가 없습니다.</td></tr>";
            return;
        }

        data.forEach(article => {
            let formattedDate = article.createdAt ? article.createdAt.replace('T', ' ').substring(0, 10) : '';

            // 🚀 댓글 개수 표시 부분
            const commentCountHtml = article.commentCount > 0
                ? `<span style="color: #3b3bf9; font-weight: bold; margin-left: 5px; font-size: 13px;">[${article.commentCount}]</span>`
                : '';

            const row = `
                <tr>
                    <td>${article.id}</td>
                    <td class="title-cell">
                        <a href="detail.html?id=${article.id}">
                            ${article.title}
                        </a>
                        ${commentCountHtml}
                    </td>
                    <td>${article.writer}</td>
                    <td>${formattedDate}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }
</script>
</body>
</html>
