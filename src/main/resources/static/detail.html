<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세 보기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        .detail-container { width: 600px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; }
        .header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .content { min-height: 200px; line-height: 1.6; }
        .comment-section { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; }
        .comment-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-box input { flex: 1; padding: 5px; }
        .comment-box button { padding: 5px 15px; }
    </style>
</head>
<body>

<div class="detail-container">
    <div class="header">
        <h2 id="title">제목이 여기에 표시됩니다</h2>
        <p><strong>작성자:</strong> <span id="writer">작성자</span> | <strong>작성일:</strong> <span id="createdAt">날짜</span></p>
    </div>

    <div class="content" id="content">
        내용이 여기에 표시됩니다.
    </div>

    <div style="text-align: right; margin-top: 20px;">
        <button onclick="goToEdit()">수정</button>
        <button onclick="deleteArticle()" style="background-color: #ff4c4c; color: white; border: none;">삭제</button>
        <button onclick="location.href='board.html'">목록으로</button>
    </div>

    <div class="comment-section">
        <h3>댓글</h3>

        <div class="comment-box">
            <input type="text" id="commentWriter" placeholder="작성자" style="flex: 0.3;">
            <input type="text" id="commentContent" placeholder="댓글을 남겨보세요">
            <button onclick="saveComment()">등록</button>
        </div>

        <ul id="commentList" style="list-style: none; padding: 0;">
            <li style="margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px;">
                <strong>안내:</strong> 아직 댓글 API를 만들지 않아서 이건 가짜(샘플) 댓글입니다!
            </li>
        </ul>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');

    // [행동 1] 화면이 켜지자마자 게시글 내용과 댓글 목록을 동시에 불러옵니다!
    if (articleId) {
        // 게시글 가져오기
        fetch(`/api/articles/${articleId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('writer').innerText = data.writer;
                document.getElementById('content').innerText = data.content;
                document.getElementById('createdAt').innerText = data.createdAt.replace('T', ' ').substring(0, 19);
            });

        // 🚀 댓글 목록 가져오기 함수 호출
        loadComments();
    }

    // 🚀 [행동 2] 댓글 목록을 백엔드에서 받아와 화면에 그려주는 함수
    function loadComments() {
        fetch(`/api/articles/${articleId}/comments`)
            .then(response => response.json())
            .then(comments => {
                const commentList = document.getElementById("commentList");
                commentList.innerHTML = ""; // 기존 가짜 댓글 지우기

                if (comments.length === 0) {
                    commentList.innerHTML = "<li style='color:gray;'>아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</li>";
                    return;
                }

                comments.forEach(comment => {
                    let date = comment.createdAt.replace('T', ' ').substring(0, 19);
                    const li = `
                            <li style="margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px;">
                                <strong>${comment.writer}</strong> : ${comment.content}
                                <span style="font-size:12px; color:gray; margin-left:10px;">(${date})</span>
                            </li>
                        `;
                    commentList.innerHTML += li;
                });
            });
    }

    // 🚀 [행동 3] 댓글 등록 버튼을 누르면 작동하는 함수
    function saveComment() {
        const writer = document.getElementById("commentWriter").value;
        const content = document.getElementById("commentContent").value;

        if(!writer || !content) {
            alert("작성자와 내용을 모두 입력해주세요!");
            return;
        }

        const requestData = { writer: writer, content: content };

        // 백엔드로 댓글 전송!
        fetch(`/api/articles/${articleId}/comments`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        })
            .then(response => {
                if (response.ok) {
                    alert("댓글이 등록되었습니다!");
                    document.getElementById("commentWriter").value = ""; // 입력창 비우기
                    document.getElementById("commentContent").value = "";
                    loadComments(); // 🚀 대박 핵심: 새로고침 없이 댓글 목록만 다시 불러오기!
                } else {
                    alert("댓글 등록 실패");
                }
            });
    }

    // 🚀 [행동 4] 게시글 삭제하기 함수
    function deleteArticle() {
        if (confirm("정말로 이 게시글을 삭제하시겠습니까?")) {
            fetch(`/api/articles/${articleId}`, {
                method: 'DELETE' // 백엔드에 "삭제해줘!" 라고 찌름
            })
                .then(response => {
                    if (response.ok) {
                        alert("게시글이 삭제되었습니다.");
                        location.href = "board.html"; // 삭제 성공 시 목록으로 강제 이동!
                    } else {
                        alert("삭제에 실패했습니다.");
                    }
                });
        }
    }

    // 🚀 [행동 5] 수정 버튼 누르면 수정 페이지로 이동하기
    function goToEdit() {
        // "edit.html" 화면으로 넘어가면서 현재 글 번호를 주소에 달고 갑니다!
        location.href = `edit.html?id=${articleId}`;
    }
</script>
</body>
</html>
