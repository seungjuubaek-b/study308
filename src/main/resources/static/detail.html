<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세 보기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px 20px; color: #333; }
        .detail-container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 30px; }
        .header h2 { margin: 0 0 10px 0; font-size: 26px; color: #222; }
        .header-info { font-size: 14px; color: #666; display: flex; justify-content: space-between; }

        .content { min-height: 250px; line-height: 1.6; font-size: 15px; color: #444; }

        .btn-group { text-align: right; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-group button { padding: 10px 20px; margin-left: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-edit { background-color: #f0f0f0; color: #333; }
        .btn-edit:hover { background-color: #ddd; }
        .btn-delete { background-color: #ff4c4c; color: white; }
        .btn-delete:hover { background-color: #d43f3f; }
        .btn-list { background-color: #333; color: white; }
        .btn-list:hover { background-color: #555; }

        /* 댓글 영역 디자인 */
        .comment-section { margin-top: 50px; }
        .comment-section h3 { font-size: 18px; margin-bottom: 15px; color: #222; }

        .comment-box { background-color: #f4f6f8; padding: 20px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 30px; align-items: center; }
        .comment-box input { padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 14px; }
        #commentWriter { width: 120px; }
        #commentContent { flex: 1; }
        .btn-comment { padding: 12px 25px; background-color: #3b3bf9; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-comment:hover { background-color: #2b2bd8; }

        .comment-list { list-style: none; padding: 0; margin: 0; }
        .comment-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 5px; }
        .comment-item .writer-date { font-size: 13px; color: #777; }
        .comment-item .writer { font-weight: bold; color: #333; margin-right: 10px; }
        .comment-item .text { font-size: 15px; color: #444; }
    </style>
</head>
<body>

<div class="detail-container">
    <div class="header">
        <h2 id="title"></h2>
        <div class="header-info">
            <span><strong>작성자:</strong> <span id="writer"></span></span>
            <span><span id="createdAt"></span></span>
        </div>
    </div>

    <div class="content" id="content"></div>

    <div class="btn-group">
        <button class="btn-edit" onclick="goToEdit()">수정</button>
        <button class="btn-delete" onclick="deleteArticle()">삭제</button>
        <button class="btn-list" onclick="location.href='board.html'">목록으로</button>
    </div>

    <div class="comment-section">
        <h3>💬 댓글</h3>

        <div class="comment-box">
            <input type="text" id="commentWriter" placeholder="작성자">
            <input type="text" id="commentContent" placeholder="댓글을 남겨보세요" onkeypress="if(event.keyCode==13) saveComment();">
            <button class="btn-comment" onclick="saveComment()">등록</button>
        </div>

        <ul id="commentList" class="comment-list">
        </ul>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');

    if (articleId) {
        fetch(`/api/articles/${articleId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('title').innerText = data.title;
                document.getElementById('writer').innerText = data.writer;
                document.getElementById('content').innerText = data.content;
                document.getElementById('createdAt').innerText = data.createdAt ? data.createdAt.replace('T', ' ').substring(0, 19) : '';
            });
        loadComments();
    }

    function loadComments() {
        fetch(`/api/articles/${articleId}/comments`)
            .then(response => response.json())
            .then(comments => {
                const commentList = document.getElementById("commentList");
                commentList.innerHTML = "";

                if (comments.length === 0) {
                    commentList.innerHTML = "<li style='color:#999; text-align:center; padding: 20px;'>아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</li>";
                    return;
                }

                comments.forEach(comment => {
                    let date = comment.createdAt ? comment.createdAt.replace('T', ' ').substring(0, 19) : '';
                    const li = `
                        <li class="comment-item">
                            <div class="writer-date">
                                <span class="writer">${comment.writer}</span>
                                <span>${date}</span>
                            </div>
                            <div class="text">${comment.content}</div>
                        </li>
                    `;
                    commentList.innerHTML += li;
                });
            });
    }

    function saveComment() {
        const writer = document.getElementById("commentWriter").value;
        const content = document.getElementById("commentContent").value;

        if(!writer || !content) {
            alert("작성자와 내용을 모두 입력해주세요!");
            return;
        }

        const requestData = { writer: writer, content: content };

        fetch(`/api/articles/${articleId}/comments`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        }).then(response => {
            if (response.ok) {
                document.getElementById("commentWriter").value = "";
                document.getElementById("commentContent").value = "";
                loadComments();
            } else {
                alert("댓글 등록 실패");
            }
        });
    }

    function deleteArticle() {
        if (confirm("정말로 이 게시글을 삭제하시겠습니까?")) {
            fetch(`/api/articles/${articleId}`, { method: 'DELETE' })
                .then(response => {
                    if (response.ok) location.href = "board.html";
                    else alert("삭제에 실패했습니다.");
                });
        }
    }

    function goToEdit() {
        location.href = `edit.html?id=${articleId}`;
    }
</script>
</body>
</html>
