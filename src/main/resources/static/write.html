<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새 게시글 작성</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px 20px; color: #333; }
        .form-container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        h2 { text-align: center; color: #222; margin-bottom: 30px; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 15px; }

        label { font-weight: bold; margin-bottom: 8px; display: block; color: #555; }
        input, textarea { width: 100%; margin-bottom: 25px; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #3b3bf9; outline: none; }

        .btn-group { text-align: center; margin-top: 10px; }
        .btn-submit { padding: 12px 35px; background-color: #3b3bf9; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-submit:hover { background-color: #2b2bd8; }
        .btn-cancel { padding: 12px 35px; background-color: #777; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; margin-left: 10px; text-decoration: none; display: inline-block; }
        .btn-cancel:hover { background-color: #555; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>✍ 새 게시글 작성</h2>

    <label>제목</label>
    <input type="text" id="title" placeholder="제목을 입력하세요">

    <label>작성자</label>
    <input type="text" id="writer" placeholder="이름을 입력하세요">

    <label>내용</label>
    <textarea id="content" rows="15" placeholder="내용을 입력하세요"></textarea>

    <div class="btn-group">
        <button class="btn-submit" onclick="saveArticle()">등록하기</button>
        <a href="board.html" class="btn-cancel">취소</a>
    </div>
</div>

<script>
    function saveArticle() {
        const title = document.getElementById("title").value;
        const writer = document.getElementById("writer").value;
        const content = document.getElementById("content").value;

        if(!title || !writer || !content) {
            alert("모든 칸을 입력해주세요!");
            return;
        }

        const requestData = { title: title, writer: writer, content: content };

        fetch('/api/articles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        })
            .then(response => {
                if (response.ok) {
                    location.href = "board.html";
                } else {
                    alert("등록에 실패했습니다.");
                }
            });
    }
</script>
</body>
</html>
