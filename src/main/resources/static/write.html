<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; text-align: center; }
        .form-container { width: 500px; margin: 0 auto; text-align: left; border: 1px solid #ddd; padding: 20px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<h2>새 게시글 작성</h2>

<div class="form-container">
    <label>제목</label>
    <input type="text" id="title" placeholder="제목을 입력하세요">

    <label>작성자</label>
    <input type="text" id="writer" placeholder="이름을 입력하세요">

    <label>내용</label>
    <textarea id="content" rows="10" placeholder="내용을 입력하세요"></textarea>

    <div style="text-align: center;">
        <button onclick="saveArticle()">등록하기</button>
        <button onclick="location.href='board.html'">목록으로 돌아가기</button>
    </div>
</div>

<script>
    // 등록하기 버튼을 누르면 실행되는 심부름꾼
    function saveArticle() {
        // 1. 사용자가 쓴 글씨들 가져오기
        const title = document.getElementById("title").value;
        const writer = document.getElementById("writer").value;
        const content = document.getElementById("content").value;

        // 2. 백엔드 규격에 맞춰서 택배 상자(JSON)로 포장하기
        const requestData = {
            title: title,
            writer: writer,
            content: content
        };

        // 3. 백엔드(안내데스크)에 POST 방식(저장해줘!)으로 데이터 쏘기
        fetch('/api/articles', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // "나 순수한 데이터(JSON) 보낸다!"라고 알려줌
            },
            body: JSON.stringify(requestData) // 자바스크립트 데이터를 글자(JSON)로 변환
        })
            .then(response => {
                if (response.ok) {
                    alert("게시글이 성공적으로 등록되었습니다!");
                    location.href = "board.html"; // 등록 성공 시 게시판 목록 화면으로 튕겨냄!
                } else {
                    alert("등록에 실패했습니다.");
                }
            })
            .catch(error => console.error("에러:", error));
    }
</script>
</body>
</html>
